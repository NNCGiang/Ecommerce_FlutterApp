name: ct1_app
description: E-commerce Flutter App

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # State management
  provider: ^6.1.1

  # Google Sign In
  google_sign_in: ^6.2.1

  # Facebook Sign In
  flutter_facebook_auth: ^7.0.1

  # Shared preferences (lưu token)
  shared_preferences: ^2.2.2

  # Image carousel
  carousel_slider: ^5.0.0

  # Icons
  cupertino_icons: ^1.0.6

  # Image picker (chọn ảnh từ thư viện)
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
